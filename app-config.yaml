app:
  title: FEINA - AsyncAPI Benchmark Platform
  baseUrl: http://localhost:3000

organization:
  name: FEINA

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:', 'ws:', 'wss:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

proxy:
  endpoints:
    '/catalog-service':
      target: 'http://catalog-service:3001'
      changeOrigin: true
      pathRewrite:
        '^/api/proxy/catalog-service': ''
    '/scenario-service':
      target: 'http://scenario-service:3002'
      changeOrigin: true
      pathRewrite:
        '^/api/proxy/scenario-service': ''
    '/benchmark-orchestrator':
      target: 'http://benchmark-orchestrator:3003'
      changeOrigin: true
      pathRewrite:
        '^/api/proxy/benchmark-orchestrator': ''
    '/metrics-api':
      target: 'http://metrics-api:3004'
      changeOrigin: true
      pathRewrite:
        '^/api/proxy/metrics-api': ''

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

auth:
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

scaffolder: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:
    - type: file
      target: ../../examples/entities.yaml
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]

kubernetes:
  {}

permission:
  enabled: true

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters: []
