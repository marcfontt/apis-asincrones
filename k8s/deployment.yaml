apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: feina
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: backstage
          image: feinaregistry.azurecr.io/backstage:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 7007
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
