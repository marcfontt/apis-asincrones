apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
  namespace: apis-asincrones
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: metrics-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: metrics-api
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: metrics-api
        image: asyncpfgpayg65454.azurecr.io/metrics-api:latest
        imagePullPolicy: Always
        env:
        - name: ELASTICSEARCH_URL
          value: http://elasticsearch:9200
        - name: PORT
          value: "3004"
        ports:
        - containerPort: 3004
          protocol: TCP
        resources:
          limits:
            cpu: 250m
            memory: 192Mi
          requests:
            cpu: 25m
            memory: 96Mi
