# ============================================================================
# Grafana — Dashboards d'inspeccio sobre Elasticsearch
#
# El portal Backstage ja te la seva propia vista de Resultats. Grafana
# nomes serveix com a finestra "ad hoc" per fer queries lliures sobre
# l'index async-metrics quan es vol explorar dades fora del que el
# portal mostra (p. ex. agregacions custom, comparativa per data, etc.).
#
# Canvis aplicats respecte la versio inicial:
#   1. ConfigMap `grafana-provisioning` munta /etc/grafana/provisioning
#      perque Grafana es declari Elasticsearch com a datasource per defecte.
#      Abans calia configurar-ho a ma cada cop que el pod es reiniciava.
#
#   2. PVC `grafana-pvc` ara SI esta muntat a /var/lib/grafana. Aixo
#      preserva dashboards, alertes i historial de queries entre restarts.
#      (Anteriorment la PVC existia pero el deployment no la referenciava.)
#
#   3. Health probes (readiness/liveness) perque K8s detecti caigudes.
#
#   4. Password admin a Secret en comptes de hardcoded.
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: apis-asincrones
  labels:
    app: grafana
    component: observability
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate  # Volum RWO: nomes un pod alhora pot muntar la PVC
  template:
    metadata:
      labels:
        app: grafana
        component: observability
    spec:
      securityContext:
        # UID 472 es el que fa servir el container oficial de grafana
        fsGroup: 472
        runAsUser: 472
      containers:
      - name: grafana
        image: grafana/grafana:10.4.0
        imagePullPolicy: IfNotPresent
        env:
        # Credencials d'admin: agafem el password d'un Secret en lloc
        # d'incrustar-lo al manifest. Vegeu k8s/grafana-secret.yaml.
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: grafana-admin
              key: user
              optional: true
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-admin
              key: password
              optional: true
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_PATHS_DATA
          value: /var/lib/grafana
        - name: GF_PATHS_LOGS
          value: /var/log/grafana
        - name: GF_PATHS_PLUGINS
          value: /var/lib/grafana/plugins
        - name: GF_PATHS_PROVISIONING
          value: /etc/grafana/provisioning
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
        volumeMounts:
        # Dades de Grafana (dashboards desats per l'usuari, sessions, etc.)
        - name: storage
          mountPath: /var/lib/grafana
        # Provisioning automatic del datasource Elasticsearch.
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: datasources
        configMap:
          name: grafana-provisioning
          items:
          - key: elasticsearch-datasource.yaml
            path: elasticsearch-datasource.yaml
