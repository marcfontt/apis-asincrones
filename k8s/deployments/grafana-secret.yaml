# ============================================================================
# Secret: credencials d'admin de Grafana
#
# Aquest secret CONTE valors en clar perque el repositori es privat i
# no es publica a producte real. Per a un desplegament en produccio,
# regenera aquests valors fora de Git i no els puguis al repo.
#
# Crear/actualitzar manualment:
#   kubectl create secret generic grafana-admin -n apis-asincrones \
#     --from-literal=user=admin \
#     --from-literal=password='canvia-aixo' \
#     --dry-run=client -o yaml | kubectl apply -f -
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: apis-asincrones
  labels:
    app: grafana
type: Opaque
stringData:
  user: admin
  password: BenchmarkAdmin2024
