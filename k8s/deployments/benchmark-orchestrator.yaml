apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-orchestrator
  namespace: apis-asincronas
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: benchmark-orchestrator
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: benchmark-orchestrator
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: benchmark-orchestrator
        image: asyncbenchmarkregistry.azurecr.io/benchmark-orchestrator:latest
        imagePullPolicy: Always
        env:
        - name: ELASTICSEARCH_URL
          value: http://elasticsearch:9200
        - name: PORT
          value: "3003"
        ports:
        - containerPort: 3003
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
