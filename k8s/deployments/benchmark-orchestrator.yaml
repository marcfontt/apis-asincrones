apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-orchestrator
  namespace: apis-asincrones
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: benchmark-orchestrator
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: benchmark-orchestrator
    spec:
      serviceAccountName: benchmark-orchestrator
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: benchmark-orchestrator
        image: asyncpfg65454.azurecr.io/benchmark-orchestrator:latest
        imagePullPolicy: Always
        env:
        - name: ELASTICSEARCH_URL
          value: http://elasticsearch:9200
        - name: PORT
          value: "3003"
        - name: NAMESPACE
          value: apis-asincrones
        - name: SCENARIO_SERVICE_URL
          value: http://scenario-service:3002
        - name: METRICS_API_URL
          value: http://metrics-api:3004
        - name: ACR_SERVER
          value: asyncpfg65454.azurecr.io
        ports:
        - containerPort: 3003
          protocol: TCP
        resources:
          limits:
            cpu: 250m
            memory: 192Mi
          requests:
            cpu: 50m
            memory: 96Mi
