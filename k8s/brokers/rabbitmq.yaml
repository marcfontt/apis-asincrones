apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-admin
  namespace: brokers
  labels:
    app: rabbitmq
type: Opaque
stringData:
  username: admin
  password: BenchmarkAdmin2024
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: brokers
  labels:
    app: rabbitmq
    component: broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: rabbitmq
        component: broker
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.13-management
        imagePullPolicy: IfNotPresent
        ports:
        - name: amqp
          containerPort: 5672
        - name: management
          containerPort: 15672
        env:
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-admin
              key: username
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-admin
              key: password
        - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
          value: "+S 1:1 +sbwt none +sbwtdcpu none +sbwtdio none"
        resources:
          requests:
            cpu: 300m
            memory: 768Mi
          limits:
            cpu: 300m
            memory: 768Mi
        readinessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "-q", "ping"]
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          tcpSocket:
            port: amqp
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: brokers
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
  - name: amqp
    port: 5672
    targetPort: amqp
  - name: management
    port: 15672
    targetPort: management
