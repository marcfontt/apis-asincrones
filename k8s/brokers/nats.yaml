apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: brokers
  labels:
    app: nats
    component: broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nats
        component: broker
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        imagePullPolicy: IfNotPresent
        args: ["-c", "/etc/nats/nats.conf"]
        ports:
        - name: client
          containerPort: 4222
        - name: monitor
          containerPort: 8222
        resources:
          requests:
            cpu: 300m
            memory: 768Mi
          limits:
            cpu: 300m
            memory: 768Mi
        readinessProbe:
          httpGet:
            path: /varz
            port: monitor
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: monitor
          initialDelaySeconds: 20
          periodSeconds: 30
        volumeMounts:
        - name: config
          mountPath: /etc/nats
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: nats-config
          items:
          - key: nats.conf
            path: nats.conf
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: brokers
  labels:
    app: nats
spec:
  type: ClusterIP
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: client
  - name: monitor
    port: 8222
    targetPort: monitor
---
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: brokers
  labels:
    app: nats
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
  - name: client
    port: 4222
    targetPort: client
  - name: monitor
    port: 8222
    targetPort: monitor
