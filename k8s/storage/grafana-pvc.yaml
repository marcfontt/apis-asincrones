# ============================================================================
# PVC: emmagatzematge persistent per a Grafana
#
# Conté els dashboards desats per l'usuari, sessions, alertes i
# qualsevol estat persistent que Grafana necessiti entre restarts.
#
# - storageClassName: azure-retain  → mateix patro que la PVC d'Elasticsearch
# - 2Gi                              → suficient per a uns quants dashboards
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: apis-asincrones
  labels:
    app: grafana
    component: observability
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: azure-retain
  resources:
    requests:
      storage: 2Gi
